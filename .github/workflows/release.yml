name: release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: prefix-dev/setup-pixi@v0.9.4
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit

  package:
    runs-on: ${{ matrix.os }}
    needs: [quality]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl tools
        if: matrix.target == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: pnpm install --frozen-lockfile
      - name: Package VSIX
        run: pnpm run package:full -- --target ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-artifact@v4
        with:
          name: krarkode-${{ matrix.target }}.vsix
          path: krarkode-${{ matrix.target }}.vsix

  publish:
    runs-on: ubuntu-latest
    needs: [package]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          path: vsix-artifacts

      - name: Publish to VS Code Marketplace
        run: |
          for f in vsix-artifacts/krarkode-*/*.vsix; do
            pnpm exec vsce publish --packagePath "$f"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            vsix-artifacts/krarkode-*/*.vsix
        env:
          GH_TOKEN: ${{ github.token }}
